[tool.pytest.ini_options]
testpaths = ["tests"]
# importlib mode so pytest does NOT treat the repo root as a package and import
# the bpy-dependent top-level __init__.py during collection.
addopts = "-q --import-mode=importlib"
consider_namespace_packages = false

# Note: the importable package name is "file_link_utilities" (the extension id). On disk
# the dev folder is "FileLinkUtilities"; Windows' case-insensitive FS makes both work.
# Tests deliberately import the bpy-free `core` package directly (see conftest.py)
# so they run outside Blender.
