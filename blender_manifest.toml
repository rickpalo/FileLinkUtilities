schema_version = "1.0.0"

# Unique extension id (no spaces). Becomes the python package name on install.
id = "file_link_utilities"
version = "0.3.24"
name = "File & Link Utilities"
tagline = "Map, clean and rewire linked assets, materials and orphan data"
maintainer = "rickpalo <rap2010@comcast.net>"
website = "https://github.com/rickpalo/FileLinkUtilities"

# "add-on" extensions register/unregister like classic add-ons.
type = "add-on"

# Targeting Blender 5+. Upper bound left open until verified against a release.
blender_version_min = "5.0.0"

license = ["SPDX:GPL-3.0-or-later"]

# Bundled wheels — only BAT (pure-Python, platform-independent).
#  - BAT's blendfile/trace modules (all we use for dependency mapping) import
#    without `requests` — verified under Blender 5.1, requests blocked, via
#    tests/probe_bat_imports.py. The requests chain (and the compiled
#    charset_normalizer wheel) is only for BAT's upload/pack features we don't use,
#    so it is NOT bundled. See docs/ARCHITECTURE.md.
#  - zstandard (needed to read Blender 3.0+ compressed .blend files) is NOT bundled
#    because Blender 5.x already ships it in its own Python (verified: zstandard
#    0.25.0 present in Blender 5.1, BAT reads compressed files — tests/smoke_compressed.py).
#    Bundling it would force a platform/ABI pin for no benefit. NOTE: the host-Python
#    dev tool tools/find_datablocks.py DOES need `pip install zstandard` separately.
wheels = ["./wheels/blender_asset_tracer-1.20-py3-none-any.whl"]

# No `platforms` pin: BAT is pure-Python and we bundle no compiled wheels, so the
# extension is platform-independent.

[permissions]
files = "Scan .blend files, write reports, and save backups before edits"

[build]
# Keep dev-only material out of the shipped extension zip.
paths_exclude_pattern = [
    "__pycache__/",
    "/.git/",
    "/.pages/",
    "/dist/",
    "/docs/",
    "/tests/",
    "/tools/",
    "/.pytest_cache/",
    "/.ruff_cache/",
    "*.zip",
    "*.blend1",
]
# NOTE: bundled wheels come from the `wheels` list above (not from scanning wheels/),
# so anything not listed there is simply not packaged.
